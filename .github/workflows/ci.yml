name: CI - Ecoanalyzer (Pro)

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ecoanalyzer/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ecoanalyzer/requirements.txt
          pip install black isort flake8 bandit pytest pytest-cov

          
      - name: Black (format check)
        run: black --check ecoanalyzer/

      - name: isort (import order check)
        run: isort --check-only ecoanalyzer/

      - name: flake8 (lint)
        run: flake8 ecoanalyzer/

      - name: Bandit (security scan)
        run: bandit -r ecoanalyzer/app

      - name: Run tests with coverage
        run: pytest ecoanalyzer/tests --cov=ecoanalyzer/app --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Build Docker image
        run: docker build -t ecoanalyzer:${{ github.sha }} .

      - name: Save Docker image as artifact
        run: |
          docker save ecoanalyzer:${{ github.sha }} | gzip > ecoanalyzer.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecoanalyzer-image
          path: ecoanalyzer.tar.gz
