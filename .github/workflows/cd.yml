name: CD — Despliegue PRE y PRO

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Validaciones CI
  
  # ─────────────────────────────────────────────
  validacion:
    name: Compilación, análisis y pruebas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: |
          pip install flake8
          flake8 . --max-line-length=120 \
                   --exclude=.git,__pycache__,test_main.py
      - run: |
          pytest test_main.py -v \
            --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ─────────────────────────────────────────────
  # JOB 2: Despliegue a PRE
  # ─────────────────────────────────────────────
  despliegue-pre:
    name: Despliegue a PRE
    runs-on: ubuntu-latest
    needs: validacion
    environment: pre
    outputs:
      vm_ip: ${{ steps.get_ip.outputs.vm_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: Login en Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS1 }}

      - name: Obtener IP de la VM PRE desde Azure
        id: get_ip
        run: |
          VM_IP=$(az vm show \
            --resource-group rg-tfg-pre \
            --name vm-tfg-pre \
            --show-details \
            --query publicIps \
            --output tsv)

          if [ -z "${VM_IP}" ]; then
            echo "Error: no se pudo obtener la IP de la VM PRE."
            exit 1
          fi

          echo "vm_ip=${VM_IP}" >> $GITHUB_OUTPUT
          echo "IP PRE: ${VM_IP}"

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_tfg
          chmod 600 ~/.ssh/id_rsa_tfg
          ssh-keyscan -H ${{ steps.get_ip.outputs.vm_ip }} \
            >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copiar código a PRE
        run: |
          scp -i ~/.ssh/id_rsa_tfg main.py requirements.txt \
            azureuser@${{ steps.get_ip.outputs.vm_ip }}:/opt/microservicio/

      - name: Reinstalar dependencias y reiniciar servicio en PRE
        run: |
          ssh -i ~/.ssh/id_rsa_tfg \
            azureuser@${{ steps.get_ip.outputs.vm_ip }} \
            "sudo rm -rf /opt/microservicio/venv && \
             python3 -m venv /opt/microservicio/venv && \
             /opt/microservicio/venv/bin/pip install --upgrade pip && \
             /opt/microservicio/venv/bin/pip install \
               -r /opt/microservicio/requirements.txt && \
             sudo systemctl restart microservicio && \
             sleep 3 && \
             sudo systemctl status microservicio --no-pager"

  # ─────────────────────────────────────────────
  # JOB 3: Pruebas de integración en PRE
  # ─────────────────────────────────────────────
  pruebas-integracion:
    name: Pruebas de integración en PRE
    runs-on: ubuntu-latest
    needs: despliegue-pre
    environment: pre
    steps:
      - name: Esperar arranque del servicio
        run: sleep 10

      - name: Health check PRE
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ needs.despliegue-pre.outputs.vm_ip }}:8000/health

      - name: Verificar landing page PRE
        run: |
          curl --fail \
            http://${{ needs.despliegue-pre.outputs.vm_ip }}:8000/ \
            | grep -i "EcoAnalyzer"

      - name: Verificar categorías
        run: |
          curl --fail \
            http://${{ needs.despliegue-pre.outputs.vm_ip }}:8000/categorias \
            | grep -i "energia"

      - name: Crear análisis de prueba
        run: |
          curl --fail -X POST \
            http://${{ needs.despliegue-pre.outputs.vm_ip }}:8000/analisis \
            -H "Content-Type: application/json" \
            -d '{"nombre":"test-ci","categoria":"energia","valor_co2_kg":45.5}'

      - name: Verificar estadísticas
        run: |
          curl --fail \
            http://${{ needs.despliegue-pre.outputs.vm_ip }}:8000/estadisticas \
            | grep -i "total_analisis"

  # ─────────────────────────────────────────────
  # JOB 4: Aprobación humana + Despliegue PRO
  # ─────────────────────────────────────────────
  despliegue-pro:
    name: Aprobación y despliegue a PRO
    runs-on: ubuntu-latest
    needs: pruebas-integracion
    environment: pro
    steps:
      - uses: actions/checkout@v4

      - name: Login en Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS1 }}

      - name: Obtener IP de la VM PRO desde Azure
        id: get_ip
        run: |
          VM_IP=$(az vm show \
            --resource-group rg-tfg-pro \
            --name vm-tfg-pro \
            --show-details \
            --query publicIps \
            --output tsv)

          if [ -z "${VM_IP}" ]; then
            echo "Error: no se pudo obtener la IP de la VM PRO."
            exit 1
          fi

          echo "vm_ip=${VM_IP}" >> $GITHUB_OUTPUT
          echo "IP PRO: ${VM_IP}"

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_tfg
          chmod 600 ~/.ssh/id_rsa_tfg
          ssh-keyscan -H ${{ steps.get_ip.outputs.vm_ip }} \
            >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copiar código a PRO
        run: |
          scp -i ~/.ssh/id_rsa_tfg main.py requirements.txt \
            azureuser@${{ steps.get_ip.outputs.vm_ip }}:/opt/microservicio/

      - name: Reinstalar dependencias y reiniciar servicio en PRO
        run: |
          ssh -i ~/.ssh/id_rsa_tfg \
            azureuser@${{ steps.get_ip.outputs.vm_ip }} \
            "sudo rm -rf /opt/microservicio/venv && \
             python3 -m venv /opt/microservicio/venv && \
             /opt/microservicio/venv/bin/pip install --upgrade pip && \
             /opt/microservicio/venv/bin/pip install \
               -r /opt/microservicio/requirements.txt && \
             sudo systemctl restart microservicio && \
             sleep 3 && \
             sudo systemctl status microservicio --no-pager"

      - name: Health check PRO
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ steps.get_ip.outputs.vm_ip }}:8000/health

      - name: Verificar landing page PRO
        run: |
          curl --fail \
            http://${{ steps.get_ip.outputs.vm_ip }}:8000/ \
            | grep -i "EcoAnalyzer"
