name: CD - Ecoanalyzer (Docker, Full Enterprise)

permissions:
  contents: read
  packages: write
  id-token: write
  
on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    # Solo ejecutar CD si el push es un MERGE de PR
    if: startsWith(github.event.head_commit.message, 'Merge pull request')

    name: "🚀 CD — Build, Push & Deploy to Azure"
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'preproduction' }}
      url: ${{ steps.healthcheck.outputs.app-url }}

    steps:
      # (todo tu CD igual que antes)
      # 1. Checkout
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4


      # 2. Selección dinámica de entorno
      - name: 🧭 Seleccionar entorno (PRE o PRO)
        id: env
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "app=ecoanalyzer-pre-app" >> $GITHUB_OUTPUT
            echo "tag=pre" >> $GITHUB_OUTPUT
          else
            echo "app=ecoanalyzer-pro-app" >> $GITHUB_OUTPUT
            echo "tag=pro" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Mostrar entorno seleccionado
        run: |
          echo "Entorno: ${{ steps.env.outputs.tag }}"
          echo "App Service: ${{ steps.env.outputs.app }}"
          echo "Docker Image: $IMAGE_NAME:${{ steps.env.outputs.tag }}"

      # 3. Login en GHCR
      - name: 🔐 Login en GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      # 4. Build imagen Docker
      - name: 🛠️ Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ steps.env.outputs.tag }} \
            .

      # 5. Validación imagen
      - name: 🔍 Validar imagen Docker construida
        run: |
          docker image inspect \
            $IMAGE_NAME:${{ steps.env.outputs.tag }}


      # 6. Push a GHCR
      - name: 🚀 Push Docker image a GHCR
        run: |
          docker push \
            $IMAGE_NAME:${{ steps.env.outputs.tag }}

      # 7. Login Azure
      - name: 🔐 Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 8. Deploy App Service
      - name: 🚀 Deploy contenedor en Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.env.outputs.app }}
          images: ${{ env.IMAGE_NAME }}:${{ steps.env.outputs.tag }}

      # 9. Esperar disponibilidad
      - name: ⏳ Esperar a que el servicio responda
        id: healthcheck
        run: |
          APP_URL="https://${{ steps.env.outputs.app }}.azurewebsites.net"

          echo "app-url=$APP_URL" >> $GITHUB_OUTPUT

          echo "Comprobando disponibilidad de $APP_URL"

          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")

            echo "Intento $i — HTTP $STATUS"

            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Servicio operativo"
              exit 0
            fi

            sleep 10
          done

          echo "❌ El servicio no respondió correctamente"
          exit 1

      # 10. Smoke Test
      - name: 🩺 Smoke test — Validar contenido
        run: |
          APP_URL="https://${{ steps.env.outputs.app }}.azurewebsites.net"

          BODY=$(curl -s "$APP_URL")

          echo "$BODY" | grep -q "EcoAnalyzer" || (
            echo "❌ No se encontró 'EcoAnalyzer' en la home"
            exit 1
          )

          echo "✅ Smoke test superado"

      # 11. Información final
      - name: ✅ Deployment completado
        run: |
          echo "Aplicación desplegada correctamente:"
          echo "https://${{ steps.env.outputs.app }}.azurewebsites.net"
