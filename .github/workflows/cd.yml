name: CD — Despliegue PRE y PRO

# Se dispara cuando se hace merge a main (evento push en rama protegida)
on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Las mismas validaciones que CI
  # ─────────────────────────────────────────────
  validacion:
    name: Compilación, análisis y pruebas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4



      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Análisis de código (flake8)
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,test_main.py

      - name: Pruebas y cobertura
        run: |
          pytest test_main.py -v \
            --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ─────────────────────────────────────────────
  # JOB 2: Despliegue a PRE
  # ─────────────────────────────────────────────
  despliegue-pre:
    name: Despliegue a PRE
    runs-on: ubuntu-latest
    needs: validacion
    environment: pre          # Entorno de GitHub con la IP y secretos de PRE

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_tfg
          chmod 600 ~/.ssh/id_rsa_tfg
          ssh-keyscan -H ${{ vars.VM_IP_PRE }} >> ~/.ssh/known_hosts

      - name: Copiar código a la VM de PRE
        run: |
          scp -i ~/.ssh/id_rsa_tfg main.py requirements.txt \
            azureuser@${{ vars.VM_IP_PRE }}:/opt/microservicio/

      - name: Instalar dependencias y reiniciar servicio en PRE
        run: |
          ssh -i ~/.ssh/id_rsa_tfg azureuser@${{ vars.VM_IP_PRE }} << 'EOF'
            cd /opt/microservicio
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart microservicio
            sudo systemctl status microservicio
          EOF

  # ─────────────────────────────────────────────
  # JOB 3: Pruebas de integración en PRE
  # ─────────────────────────────────────────────
  pruebas-integracion:
    name: Pruebas de integración en PRE
    runs-on: ubuntu-latest
    needs: despliegue-pre
    environment: pre 
    steps:
      - name: Esperar a que el servicio arranque
        run: sleep 10

      - name: Health check PRE
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ vars.VM_IP_PRE }}:8000/health

      - name: Prueba de integración — crear item
        run: |
          curl --fail -X POST \
            http://${{ vars.VM_IP_PRE }}:8000/items \
            -H "Content-Type: application/json" \
            -d '{"nombre":"test-integracion","precio":1.0}'

      - name: Prueba de integración — listar items
        run: |
          curl --fail http://${{ vars.VM_IP_PRE }}:8000/items

  # ─────────────────────────────────────────────
  # JOB 4: Validación humana (aprobación manual)
  # ─────────────────────────────────────────────
  aprobacion-pro:
    name: Aprobación manual para PRO
    runs-on: ubuntu-latest
    needs: pruebas-integracion
    environment: pro          # Entorno de GitHub con "Required reviewers" configurado

    steps:
      - name: Aprobación concedida
        run: echo "Despliegue a PRO aprobado. Iniciando..."

  # ─────────────────────────────────────────────
  # JOB 5: Despliegue a PRO
  # ─────────────────────────────────────────────
  despliegue-pro:
    name: Despliegue a PRO
    runs-on: ubuntu-latest
    needs: aprobacion-pro

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_tfg
          chmod 600 ~/.ssh/id_rsa_tfg
          ssh-keyscan -H ${{ vars.VM_IP_PRO }} >> ~/.ssh/known_hosts

      - name: Copiar código a la VM de PRO
        run: |
          scp -i ~/.ssh/id_rsa_tfg main.py requirements.txt \
            azureuser@${{ vars.VM_IP_PRO }}:/opt/microservicio/

      - name: Instalar dependencias y reiniciar servicio en PRO
        run: |
          ssh -i ~/.ssh/id_rsa_tfg azureuser@${{ vars.VM_IP_PRO }} << 'EOF'
            cd /opt/microservicio
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart microservicio
            sudo systemctl status microservicio
          EOF

      - name: Health check PRO
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ vars.VM_IP_PRO }}:8000/health
