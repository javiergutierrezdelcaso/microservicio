name: CD — Despliegue PRE y PRO

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Las mismas validaciones que CI
  # ─────────────────────────────────────────────
  validacion:
    name: Compilación, análisis y pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Análisis de código (flake8)
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=.git,__pycache__,test_main.py

      - name: Pruebas y cobertura
        run: |
          pip install pytest pytest-cov
          pytest test_main.py -v \
            --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ─────────────────────────────────────────────
  # JOB 2: Despliegue a PRE
  # ─────────────────────────────────────────────
  despliegue-pre:
    name: Despliegue a PRE
    runs-on: ubuntu-latest
    needs: validacion
    environment: pre       # Usa el entorno 'pre'
    outputs:
      vm_ip: ${{ steps.get_ip.outputs.vm_ip }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 1. Autenticarse en Azure de forma segura
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS1 }}

      # 2. Consultar la IP real directamente a Azure (Cambia el nombre de la VM y el Resource Group por los tuyos)
      - name: Obtener IP de PRE desde Azure
        id: get_ip
        run: |
          echo "Consultando la IP pública real en Azure..."
          IP_PRE=$(az network public-ip show \
            --resource-group rg-tfg-pre \
            --name pip-tfg-pre \
            --query ipAddress -o tsv)

          if [ -z "$IP_PRE" ] || [ "$IP_PRE" == "null" ]; then
            echo "❌ Error: Azure no ha asignado todavía una IP pública a este recurso."
            exit 1
          fi

          echo "IP de PRE detectada en Azure: $IP_PRE"
          echo "vm_ip=${IP_PRE}" >> $GITHUB_OUTPUT

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_tfg
          chmod 600 ~/.ssh/id_rsa_tfg
          ssh-keyscan -H ${{ steps.get_ip.outputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Copiar código a la VM de PRE
        run: |
          scp -i ~/.ssh/id_rsa_tfg main.py requirements.txt \
            azureuser@${{ steps.get_ip.outputs.vm_ip }}:/opt/microservicio/

      - name: Instalar dependencias y reiniciar servicio en PRE
        run: |
          ssh -i ~/.ssh/id_rsa_tfg azureuser@${{ steps.get_ip.outputs.vm_ip }} << 'EOF'
            cd /opt/microservicio
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart microservicio
            sudo systemctl status microservicio
          EOF

  # ─────────────────────────────────────────────
  # JOB 3: Pruebas de integración en PRE
  # ─────────────────────────────────────────────
  pruebas-integracion:
    name: Pruebas de integración en PRE
    runs-on: ubuntu-latest
    needs: despliegue-pre
    environment: pre 
    steps:
      - name: Esperar a que el servicio arranque
        run: sleep 10

      - name: Health check PRE
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ needs.despliegue-pre.outputs.vm_ip }}:8000/health

      - name: Prueba de integración — crear item
        run: |
          curl --fail -X POST \
            http://${{ needs.despliegue-pre.outputs.vm_ip }}:8000/items \
            -H "Content-Type: application/json" \
            -d '{"nombre":"test-integracion","precio":1.0}'

      - name: Prueba de integración — listar items
        run: |
          curl --fail http://${{ needs.despliegue-pre.outputs.vm_ip }}:8000/items

  # ─────────────────────────────────────────────
  # JOB 4: Validación humana (aprobación manual)
  # ─────────────────────────────────────────────
  aprobacion-pro:
    name: Aprobación manual para PRO
    runs-on: ubuntu-latest
    needs: pruebas-integracion
    environment: pro

    steps:
      - name: Aprobación concedida
        run: echo "Despliegue a PRO aprobado. Iniciando..."

  # ─────────────────────────────────────────────
  # JOB 5: Despliegue a PRO
  # ─────────────────────────────────────────────
  despliegue-pro:
    name: Despliegue a PRO
    runs-on: ubuntu-latest
    needs: aprobacion-pro
    environment: pro

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 1. Autenticarse en Azure para el entorno PRO
      - name: Login en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS1 }}

      # 2. Consultar la IP real de PRO directamente a Azure (Cambia los nombres por los tuyos de PRO)
      - name: Obtener IP de PRO desde Azure
        id: get_ip_pro
        run: |
          echo "Consultando la IP pública real de PRO en Azure..."
          IP_PRO=$(az network public-ip show \
            --resource-group rg-tfg-pro \
            --name pip-tfg-pro \
            --query ipAddress -o tsv)

          if [ -z "$IP_PRO" ] || [ "$IP_PRO" == "null" ]; then
            echo "❌ Error: Azure no ha asignado todavía una IP pública a PRO."
            exit 1
          fi

          echo "IP de PRO detectada en Azure: $IP_PRO"
          echo "vm_ip=${IP_PRO}" >> $GITHUB_OUTPUT

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa_tfg
          chmod 600 ~/.ssh/id_rsa_tfg
          ssh-keyscan -H ${{ steps.get_ip_pro.outputs.vm_ip }} >> ~/.ssh/known_hosts

      - name: Copiar código a la VM de PRO
        run: |
          scp -i ~/.ssh/id_rsa_tfg main.py requirements.txt \
            azureuser@${{ steps.get_ip_pro.outputs.vm_ip }}:/opt/microservicio/

      - name: Instalar dependencias y reiniciar servicio en PRO
        run: |
          ssh -i ~/.ssh/id_rsa_tfg azureuser@${{ steps.get_ip_pro.outputs.vm_ip }} << 'EOF'
            cd /opt/microservicio
            ./venv/bin/pip install -r requirements.txt
            sudo systemctl restart microservicio
            sudo systemctl status microservicio
          EOF

      - name: Health check PRO
        run: |
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ steps.get_ip_pro.outputs.vm_ip }}:8000/health
